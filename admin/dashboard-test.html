<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理控制台 - 三角洲行动</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00dbde;
      --secondary: #fc00ff;
      --dark: #0f172a;
      --darker: #0a0f1f;
      --light: #f8fafc;
      --gray: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .admin-container {
      display: flex;
      min-height: 100vh;
    }
    /* 侧边栏 */
    .sidebar {
      width: 250px;
      background: var(--dark);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }
    .logo {
      padding: 0 20px 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    .logo p {
      color: var(--gray);
      font-size: 12px;
      opacity: 0.8;
    }
    .nav-menu {
      list-style: none;
      padding: 0 15px;
    }
    .nav-item {
      margin-bottom: 5px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      color: var(--gray);
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--light);
    }
    .nav-link.active {
      background: linear-gradient(90deg, rgba(0, 219, 222, 0.1), rgba(252, 0, 255, 0.1));
      color: var(--primary);
      border-left: 3px solid var(--primary);
    }
    .nav-link i {
      width: 24px;
      margin-right: 12px;
      font-size: 16px;
    }
    .user-info {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: auto;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .user-name {
      font-weight: 500;
      margin-bottom: 5px;
    }
    .user-role {
      font-size: 12px;
      color: var(--gray);
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
    }
    .btn-logout {
      display: block;
      width: 100%;
      padding: 8px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.2);
    }
    /* 主内容区 */
    .main-content {
      flex: 1;
      margin-left: 250px;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header h2 {
      font-size: 24px;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 219, 222, 0.3);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--light);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 219, 222, 0.3);
    }
    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .stat-icon.users { background: rgba(59, 130, 246, 0.1); color: var(--info); }
    .stat-icon.orders { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .stat-icon.revenue { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .stat-icon.active { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .stat-label {
      color: var(--gray);
      font-size: 14px;
    }
    .stat-change {
      font-size: 12px;
      margin-top: 5px;
    }
    .stat-change.positive { color: var(--success); }
    .stat-change.negative { color: var(--danger); }
    /* 内容区域 */
    .content-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
    }
    .table-container {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 12px 15px;
      color: var(--gray);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .badge-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--info); }
    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
      margin-right: 5px;
    }
    /* 响应式 */
    @media (max-width: 992px) {
      .sidebar {
        width: 70px;
        overflow: visible;
      }
      .logo h1, .logo p, .nav-link span, .user-info > div:not(.user-avatar) {
        display: none;
      }
      .nav-link {
        justify-content: center;
        padding: 15px;
      }
      .nav-link i {
        margin-right: 0;
        font-size: 18px;
      }
      .user-info {
        padding: 15px 10px;
      }
      .user-avatar {
        width: 30px;
        height: 30px;
        font-size: 14px;
        margin: 0 auto;
      }
      .main-content {
        margin-left: 70px;
      }
    }
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      .header-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
    /* 加载状态 */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }
    .demo-notice {
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #ffd700;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <h1>Delta</h1>
        <p>管理控制台</p>
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="dashboard-test.html" class="nav-link active">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="users-test.html" class="nav-link">
            <i class="fas fa-users"></i>
            <span>用户管理</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="orders-test.html" class="nav-link">
            <i class="fas fa-shopping-cart"></i>
            <span>订单管理</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="stats-test.html" class="nav-link">
            <i class="fas fa-chart-bar"></i>
            <span>数据统计</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="login-test.html" class="nav-link">
            <i class="fas fa-sign-out-alt"></i>
            <span>重新登录</span>
          </a>
        </li>
      </ul>
      
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-name" id="userName">管理员</div>
        <div class="user-role" id="userRole">admin</div>
        <button class="btn-logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> 退出登录
        </button>
      </div>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <div class="header">
        <h2>管理控制台</h2>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="refreshData()">
            <i class="fas fa-sync-alt"></i> 刷新
          </button>
          <button class="btn btn-primary" onclick="showServerInfo()">
            <i class="fas fa-info-circle"></i> 服务器信息
          </button>
        </div>
      </div>
      
      <div class="demo-notice">
        <strong>🎯 演示模式</strong> - 此版本使用模拟API服务器，数据为静态演示数据。
        完整功能需要连接真实的后端服务器。
      </div>
      
      <div id="alert" class="alert"></div>
      
      <!-- 统计卡片 -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-icon users">
              <i class="fas fa-users"></i>
            </div>
          </div>
          <div class="stat-change positive">+0 今日</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">总订单数</div>
            </div>
            <div class="stat-icon orders">
              <i class="fas fa-shopping-cart"></i>
            </div>
          </div>
          <div class="stat-change positive">+0 今日</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">总收入</div>
            </div>
            <div class="stat-icon revenue">
              <i class="fas fa-yen-sign"></i>
            </div>
          </div>
          <div class="stat-change positive">¥0 今日</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label
