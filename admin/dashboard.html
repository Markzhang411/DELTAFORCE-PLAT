<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理控制台 - 三角洲行动</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00dbde;
      --secondary: #fc00ff;
      --dark: #0f172a;
      --darker: #0a0f1f;
      --light: #f8fafc;
      --gray: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .admin-container {
      display: flex;
      min-height: 100vh;
    }
    /* 侧边栏 */
    .sidebar {
      width: 250px;
      background: var(--dark);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }
    .logo {
      padding: 0 20px 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    .logo p {
      color: var(--gray);
      font-size: 12px;
      opacity: 0.8;
    }
    .nav-menu {
      list-style: none;
      padding: 0 15px;
    }
    .nav-item {
      margin-bottom: 5px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      color: var(--gray);
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--light);
    }
    .nav-link.active {
      background: linear-gradient(90deg, rgba(0, 219, 222, 0.1), rgba(252, 0, 255, 0.1));
      color: var(--primary);
      border-left: 3px solid var(--primary);
    }
    .nav-link i {
      width: 24px;
      margin-right: 12px;
      font-size: 16px;
    }
    .user-info {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: auto;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .user-name {
      font-weight: 500;
      margin-bottom: 5px;
    }
    .user-role {
      font-size: 12px;
      color: var(--gray);
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
    }
    .btn-logout {
      display: block;
      width: 100%;
      padding: 8px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.2);
    }
    /* 主内容区 */
    .main-content {
      flex: 1;
      margin-left: 250px;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header h2 {
      font-size: 24px;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 219, 222, 0.3);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--light);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 219, 222, 0.3);
    }
    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .stat-icon.users { background: rgba(59, 130, 246, 0.1); color: var(--info); }
    .stat-icon.orders { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .stat-icon.revenue { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .stat-icon.active { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .stat-label {
      color: var(--gray);
      font-size: 14px;
    }
    .stat-change {
      font-size: 12px;
      margin-top: 5px;
    }
    .stat-change.positive { color: var(--success); }
    .stat-change.negative { color: var(--danger); }
    /* 内容区域 */
    .content-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
    }
    .table-container {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 12px 15px;
      color: var(--gray);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .badge-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--info); }
    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
      margin-right: 5px;
    }
    /* 响应式 */
    @media (max-width: 992px) {
      .sidebar {
        width: 70px;
        overflow: visible;
      }
      .logo h1, .logo p, .nav-link span, .user-info > div:not(.user-avatar) {
        display: none;
      }
      .nav-link {
        justify-content: center;
        padding: 15px;
      }
      .nav-link i {
        margin-right: 0;
        font-size: 18px;
      }
      .user-info {
        padding: 15px 10px;
      }
      .user-avatar {
        width: 30px;
        height: 30px;
        font-size: 14px;
        margin: 0 auto;
      }
      .main-content {
        margin-left: 70px;
      }
    }
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      .header-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
    /* 加载状态 */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">
        <h1>Delta</h1>
        <p>管理控制台</p>
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="dashboard.html" class="nav-link active">
            <i class="fas fa-tachometer-alt"></i>
            <span>仪表盘</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="users.html" class="nav-link">
            <i class="fas fa-users"></i>
            <span>用户管理</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="orders.html" class="nav-link">
            <i class="fas fa-shopping-cart"></i>
            <span>订单管理</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="stats.html" class="nav-link">
            <i class="fas fa-chart-bar"></i>
            <span>数据统计</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="logs.html" class="nav-link">
            <i class="fas fa-history"></i>
            <span>系统日志</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="settings.html" class="nav-link">
            <i class="fas fa-cog"></i>
            <span>系统设置</span>
          </a>
        </li>
      </ul>
      
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-name" id="userName">管理员</div>
        <div class="user-role" id="userRole">admin</div>
        <button class="btn-logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> 退出登录
        </button>
      </div>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <div class="header">
        <h2>管理控制台</h2>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="refreshData()">
            <i class="fas fa-sync-alt"></i> 刷新
          </button>
          <button class="btn btn-primary" onclick="createAdmin()">
            <i class="fas fa-plus"></i> 创建管理员
          </button>
        </div>
      </div>
      
      <div id="alert" class="alert"></div>
      
      <!-- 统计卡片 -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-icon users">
              <i class="fas fa-users"></i>
            </div>
          </div>
          <div class="stat-change positive">+0 今日</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">总订单数</div>
            </div>
            <div class="stat-icon orders">
              <i class="fas fa-shopping-cart"></i>
            </div>
          </div>
          <div class="stat-change positive">+0 今日</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">总收入</div>
            </div>
            <div class="stat-icon revenue">
              <i class="fas fa-yen-sign"></i>
            </div>
          </div>
          <div class="stat-change positive">¥0 今日</div>
        </div>
        
        <div class="stat-card">
          <div class="stat-header">
            <div>
              <div class="stat-value loading"></div>
              <div class="stat-label">活跃订单</div>
            </div>
            <div class="stat-icon active">
              <i class="fas fa-bolt"></i>
            </div>
          </div>
          <div class="stat-change negative">-0 变化</div>
        </div>
      </div>
      
      <!-- 最近订单 -->
      <div class="content-section">
        <div class="section-header">
          <h3 class="section-title">最近订单</h3>
          <a href="orders.html" class="btn btn-secondary">查看全部</a>
        </div>
        <div class="table-container">
          <table id="recentOrdersTable">
            <thead>
              <tr>
                <th>订单号</th>
                <th>服务类型</th>
                <th>金额</th>
                <th>状态</th>
                <th>发布时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" style="text-align: center; padding: 40px;">
                  <div class="loading"></div> 加载中...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- 最近用户 -->
      <div class="content-section">
        <div class="section-header">
          <h3 class="section-title">最近注册用户</h3>
          <a href="users.html" class="btn btn-secondary">查看全部</a>
        </div>
        <div class="table-container">
          <table id="recentUsersTable">
            <thead>
              <tr>
                <th>用户ID</th>
                <th>手机号</th>
                <th>姓名</th>
                <th>角色</th>
                <th>注册时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" style="text-align: center; padding: 40px;">
                  <div class="loading"></div> 加载中...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let adminToken = '';
    let adminUser = null;
    
    // 初始化
    function init() {
      // 检查认证
      checkAuth();
      
      // 加载用户信息
      loadUserInfo();
      
      // 加载数据
      loadDashboardData();
      
      // 设置自动刷新
      setInterval(loadDashboardData, 30000); // 30秒刷新一次
    }
    
    // 检查认证
    function checkAuth() {
      adminToken = localStorage.getItem('admin_token');
      const userStr = localStorage.getItem('admin_user');
      
      if (!adminToken || !userStr) {
        window.location.href = 'login.html';
        return;
      }
      
      try {
        adminUser = JSON.parse(userStr);
        if (adminUser.role !== 'admin') {
          showAlert('权限不足，需要管理员权限', 'error');
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      } catch (e) {
        localStorage.clear();
        window.location.href = 'login.html';
      }
    }
    
    // 加载用户信息
    function loadUserInfo() {
      if (adminUser) {
        document.getElementById('userName').textContent = adminUser.name || '管理员';
        document.getElementById('userRole').textContent = adminUser.role;
        
        // 设置头像首字母
        const avatar = document.getElementById('userAvatar');
        const name = adminUser.name || 'A';
        avatar.textContent = name.charAt(0).toUpperCase();
        
        // 随机头像颜色
        const colors = [
          'linear-gradient(135deg, #00dbde, #fc00ff)',
          'linear-gradient(135deg, #667eea, #764ba2)',
          'linear-gradient(135deg, #f093fb, #f5576c)',
          'linear-gradient(135deg, #4facfe, #00f2fe)'
        ];
        avatar.style.background = colors[Math.floor(Math.random() * colors.length)];
      }
    }
    
    // 显示提示
    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alert.style.display = 'block';
      
      if (type === 'success') {
        setTimeout(() => alert.style.display = 'none', 3000);
      }
    }
    
    // API请求
    async function apiRequest(endpoint, options = {}) {
      const defaultOptions = {
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${adminToken}`
        }
      };
      
      const config = { ...defaultOptions, ...options };
      
      try {
        const response = await fetch(`${API_BASE}${endpoint}`, config);
        
        if (response.status === 401) {
          // Token过期
          localStorage.clear();
          window.location.href = 'login.html';
          return null;
        }
        
        return await response.json();
      } catch (error) {
        console.error('API请求错误:', error);
        showAlert('网络错误，请检查连接', 'error');
        return null;
      }
    }
    
    // 加载仪表盘数据
    async function loadDashboardData() {
      // 加载统计
      const statsData = await apiRequest('/api/admin/stats');
      if (statsData && statsData.ok) {
        updateStats(statsData.stats);
      }
      
      // 加载最近订单
      const ordersData = await apiRequest('/api/admin/orders?limit=5');
      if (ordersData && ordersData.ok) {
        updateRecentOrders(ordersData.orders);
      }
      
      // 加载最近用户
      const usersData = await apiRequest('/api/admin/users?limit=5');
      if (usersData && usersData.ok) {
        updateRecentUsers(usersData.users);
      }
    }
    
    // 更新统计卡片
    function updateStats(stats) {
      const statsGrid = document.getElementById('statsGrid');
      
      // 总用户数
      statsGrid.children[0].querySelector('.stat-value').textContent = stats.totalUsers;
      statsGrid.children[0].querySelector('.stat-change').textContent = `+${Math.floor(stats.totalUsers * 0.05)} 今日`;
      
      // 总订单数
      statsGrid.children[1].querySelector('.stat-value').textContent = stats.totalOrders;
      statsGrid.children[1].querySelector('.stat-change').textContent = `+${Math.floor(stats.totalOrders * 0.03)} 今日`;
      
      // 总收入
      statsGrid.children[2].querySelector('.stat-value').textContent = `¥${stats.totalRevenue}`;
      statsGrid.children[2].querySelector('.stat-change').textContent = `¥${Math.floor(stats.totalRevenue * 0.02)} 今日`;
      
      // 活跃订单
      statsGrid.children[3].querySelector('.stat-value').textContent = stats.activeOrders;
      const activeChange = stats.activeOrders > 10 ? 'positive' : 'negative';
      statsGrid.children[3].querySelector('.stat-change').className = `stat-change ${activeChange}`;
      statsGrid.children[3].querySelector('.stat-change').textContent = 
        activeChange === 'positive' ? `+${Math.floor(stats.activeOrders * 0.1)} 变化` : `-${Math.floor(stats.activeOrders * 0.1)} 变化`;
    }
    
    // 更新最近订单表格
    function updateRecentOrders(orders) {
      const tbody = document.querySelector('#recentOrdersTable tbody');
      tbody.innerHTML = '';
      
      if (orders.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px; color: var(--gray);">
              暂无订单数据
            </td>
          </tr>
        `;
        return;
      }
      
      orders.forEach(order => {
        const statusClass = {
          'pending': 'badge-warning',
          'locked': 'badge-info',
          'doing': 'badge-info',
          'completed': 'badge-success',
          'cancelled': 'badge-danger'
        }[order.status] || 'badge-secondary';
        
        const statusText = {
          'pending': '待匹配',
          'locked': '已匹配',
          'doing': '进行中',
          'completed': '已完成',
          'cancelled': '已取消'
        }[order.status] || order.status;
        
        const serviceType = {
          'escort': '护航服务',
          'loot': '代肝跑刀',
          'crash': '物资互助',
          'clear': '清图服务'
        }[order.service_type] || order.service_type;
        
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${order.order_id}</strong></td>
          <td>${serviceType}</td>
          <td>¥${order.price}</td>
          <td><span class="badge ${statusClass}">${statusText}</span></td>
          <td>${formatTime(order.created_at)}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="viewOrder('${order.order_id}')">
              查看
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }
    
    // 更新最近用户表格
    function updateRecentUsers(users) {
      const tbody = document.querySelector('#recentUsersTable tbody');
      tbody.innerHTML = '';
      
      if (users.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px; color: var(--gray);
              暂无用户数据
            </td>
          </tr>
        `;
        return;
      }
      
      users.forEach(user => {
        const roleClass = {
          'admin': 'badge-danger',
          'hunter': 'badge-success',
          'client': 'badge-info'
        }[user.role] || 'badge-secondary';
        
        const roleText = {
          'admin': '管理员',
          'hunter': '护航员',
          'client': '客户'
        }[user.role] || user.role;
        
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.id}</td>
          <td>${user.phone}</td>
          <td>${user.name || '未设置'}</td>
          <td><span class="badge ${roleClass}">${roleText}</span></td>
          <td>${formatTime(user.created_at)}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="viewUser(${user.id})">
              查看
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }
    
    // 时间格式化
    function formatTime(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr + 'Z');
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
      
      return date.toLocaleDateString('zh-CN', { 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    // 查看订单
    function viewOrder(orderId) {
      window.location.href = `order-detail.html?id=${orderId}`;
    }
    
    // 查看用户
    function viewUser(userId) {
      window.location.href = `user-detail.html?id=${userId}`;
    }
    
    // 刷新数据
    function refreshData() {
      showAlert('正在刷新数据...', 'success');
      loadDashboardData();
    }
    
    // 创建管理员
    function createAdmin() {
      const phone = prompt('请输入管理员手机号：');
      if (!phone) return;
      
      const password = prompt('请输入密码：');
      if (!password) return;
      
      const name = prompt('请输入管理员姓名（可选）：') || '管理员';
      
      if (confirm(`确认创建管理员账号？\n手机号: ${phone}\n姓名: ${name}`)) {
        apiRequest('/api/admin/create', {
          method: 'POST',
          body: JSON.stringify({ phone, password, name })
        }).then(data => {
          if (data && data.ok) {
            showAlert(`管理员账号创建成功！用户ID: ${data.userId}`, 'success');
          } else {
            showAlert(data?.msg || '创建失败', 'error');
          }
        });
      }
    }
    
    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        localStorage.clear();
        window.location.href = 'login.html';
      }
    }
    
    // 页面加载完成后初始化
    window.addEventListener('load', init);
  </script>
</body>
</html>
